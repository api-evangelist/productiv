components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: OAuth2
      description: >-
        Bearer token obtained from the OAuth2 token endpoint at
        https://login.api.productiv.com/oauth2/token using client credentials
        grant type.
  schemas:
    AppSummary:
      type: object
      description: >-
        Represents a single application with a limited set of attributes.
      properties:
        ApplicationId:
          type: string
          description: The unique identifier of the application.
          example: '500123'
        AppName:
          type: string
          description: The name of the application.
          example: example_value
        AppStatus:
          type: string
          description: The current status of the application.
          example: example_value
        VendorName:
          type: string
          description: The name of the vendor.
          example: example_value
        AppCategory:
          type: string
          description: The category of the application.
          example: example_value
    AppDetails:
      type: object
      description: >-
        Represents a single application with a larger set of attributes than
        provided in the AppSummary, including Instances, Activity, Contract,
        Fiscal Spend, Compliance, and SSO Protocols.
      properties:
        ApplicationId:
          type: string
          description: The unique identifier of the application.
          example: '500123'
        AppName:
          type: string
          description: The name of the application.
          example: example_value
        AppStatus:
          type: string
          description: The current status of the application.
          example: example_value
        VendorName:
          type: string
          description: The name of the vendor.
          example: example_value
        Instances:
          type: array
          description: Application instances.
          items:
            type: object
            properties:
              instanceId:
                type: string
              instanceName:
                type: string
          example: []
        Activity:
          type: object
          description: Usage activity metrics for the application.
          properties:
            totalUsers:
              type: integer
            activeUsers:
              type: integer
            lastActivityDate:
              type: string
              format: date
          example: example_value
        Contracts:
          type: array
          description: Contract details associated with the application.
          items:
            type: object
            properties:
              contractId:
                type: string
              startDate:
                type: string
                format: date
              endDate:
                type: string
                format: date
              totalValue:
                type: number
          example: []
        FiscalSpend:
          type: object
          description: Fiscal spend data for the application.
          properties:
            totalSpend:
              type: number
            currency:
              type: string
          example: example_value
        Compliance:
          type: object
          description: Security standard compliance information.
          properties:
            standards:
              type: array
              items:
                type: string
          example: example_value
        SSOProtocols:
          type: array
          description: SSO protocols supported by the application.
          items:
            type: string
          example: []
