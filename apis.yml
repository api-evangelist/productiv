apis:
  - aid: productiv:developer-api
    name: Productiv Developer API
    description: >-
      The Productiv Developer APIs support integrating custom applications into
      the Productiv platform, allowing external developers to define and publish
      new connected applications. Includes APIs for pushing usage events and
      user information, Data Export APIs for fetching app portfolio details,
      provisioning workflows, and audit events.
    humanURL: https://docs.app.productiv.com/developer-api/index.html
    baseURL: https://public-api.productiv.com
    tags:
      - Application Portfolio
      - Audit Events
      - Data Export
      - Provisioning
      - SaaS Management
      - Spend Data
      - Usage Analytics
    properties:
      - type: Documentation
        url: https://docs.app.productiv.com/developer-api/index.html
      - type: OpenAPI
        url: openapi/productiv-developer-openapi.yml
      - type: Authentication
        url: https://docs.app.productiv.com/developer-api/authorization.html
      - type: GettingStarted
        url: https://docs.app.productiv.com/developer-api/data-export-getting-started.html
